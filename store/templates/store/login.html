{% extends 'store/base.html' %}
{% block title %}Login – VelvetCart{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">🛍 VelvetCart</div>
    <h2>Welcome Back</h2>
    <p class="auth-subtitle">Sign in to your account</p>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        {{ form.username }}
      </div>
      <div class="form-group">
        <label>Password</label>
        {{ form.password }}
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-block">Sign In</button>
    </form>

    <p class="auth-switch">
      Don't have an account? <a href="{% url 'store:register' %}">Register</a>
    </p>
  </div>
</div>
{% endblock %}
